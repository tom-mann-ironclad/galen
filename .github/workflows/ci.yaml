name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test, lint and build snapshot
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Run tests
        run: cargo test --locked

      - name: Build snapshot binary
        run: cargo build --release --locked

      - name: Prepare snapshot artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          SHORT_SHA="${GITHUB_SHA::12}"
          cp target/release/galen "dist/galen-linux-x86_64-snapshot-${SHORT_SHA}"
          sha256sum "dist/galen-linux-x86_64-snapshot-${SHORT_SHA}" > dist/checksums.txt

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v7
        with:
          name: galen-snapshot-${{ github.sha }}
          path: |
            dist/galen-linux-x86_64-snapshot-*
            dist/checksums.txt
